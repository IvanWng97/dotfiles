version: 2

updates:
  # Keep GitHub Actions versions up to date — opens monthly PRs when
  # any `uses: foo/bar@vX` in .github/workflows/ has a newer release.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
      include: scope
    labels:
      - ci
      - dependencies
