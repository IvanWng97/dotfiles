name: lint

on:
  push:
    paths:
      - 'scripts/**'
      - 'Backup/Brewfile'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - 'scripts/**'
      - 'Backup/Brewfile'
      - '.github/workflows/lint.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck on scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
