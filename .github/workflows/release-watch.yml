name: Release Watch

# Weekly cron that checks upstream releases of every tool with a config
# under .config/, diffs against the last-seen versions in
# .github/release-watch-state.json, and opens ONE GitHub issue
# summarizing changes that would actually affect THIS repo's configs.
# Silent on a clean week, silent when upstream changes don't touch the
# options the user has set.

on:
  schedule:
    # Mondays 09:00 UTC — findings visible at start of week.
    - cron: "0 9 * * 1"
  workflow_dispatch:

concurrency:
  group: release-watch
  cancel-in-progress: true

permissions:
  contents: write     # Commit updated state file back to main.
  issues: write       # Open the summary issue.
  id-token: write     # Required by claude-code-action.

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so the commit-state step can `git pull --rebase`
          # if main moved while the workflow was running.
          fetch-depth: 0

      - name: Ensure release-watch label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create release-watch \
            --color "0075ca" \
            --description "Upstream release with changes worth reviewing" \
            --force

      - name: Diff upstream releases against last-seen state
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          state_file=.github/release-watch-state.json
          [ -f "$state_file" ] || echo '{}' > "$state_file"

          # tool slug → "repo:source". `source` is "release" (use the
          # GitHub Releases API and ignore pre-releases) or "tag" (the
          # repo publishes version tags but no GitHub Releases — e.g.
          # ghostty, which only ships a rolling "tip" prerelease). Slug
          # must match the .config/<slug>/ dir.
          declare -A tools=(
            [alacritty]="alacritty/alacritty:release"
            [fish]="fish-shell/fish-shell:release"
            [ghostty]="ghostty-org/ghostty:tag"
            [helix]="helix-editor/helix:release"
            [kitty]="kovidgoyal/kitty:release"
            [lazygit]="jesseduffield/lazygit:release"
            [lf]="gokcehan/lf:release"
            [starship]="starship/starship:release"
            [tealdeer]="tealdeer-rs/tealdeer:release"
            [tmux]="tmux/tmux:release"
            [xplr]="sayanarijit/xplr:release"
            [zellij]="zellij-org/zellij:release"
          )

          updates="[]"
          new_state=$(cat "$state_file")

          for tool in "${!tools[@]}"; do
            cfg="${tools[$tool]}"
            repo="${cfg%:*}"
            source="${cfg##*:}"
            latest=""
            url=""

            if [ "$source" = "release" ]; then
              # IMPORTANT: don't use `gh api --jq` here. On 4xx, gh
              # dumps the error JSON to stdout *and* exits non-zero,
              # so `latest=$(gh api ... --jq '.tag_name' || echo "")`
              # ends up holding the error body, not empty string,
              # and the empty-check below fails to skip. Capture the
              # whole body first, parse only on success.
              if response=$(gh api "repos/$repo/releases/latest" 2>/dev/null); then
                latest=$(jq -r '.tag_name // ""' <<<"$response")
                url=$(jq -r '.html_url // ""' <<<"$response")
              fi
            else
              # Tag mode: take the most recent tag. GitHub's /tags
              # endpoint sorts by tag creation time, which is good
              # enough — repos that need this path don't tend to
              # backport tags on old branches.
              if response=$(gh api "repos/$repo/tags?per_page=1" 2>/dev/null); then
                latest=$(jq -r '.[0].name // ""' <<<"$response")
              fi
              if [ -n "$latest" ]; then
                prev_for_url=$(jq -r --arg t "$tool" '.[$t] // ""' <<<"$new_state")
                if [ -n "$prev_for_url" ]; then
                  # Compare URL: best signal for tag-only repos since
                  # there are no release notes to link to.
                  url="https://github.com/$repo/compare/${prev_for_url}...${latest}"
                else
                  url="https://github.com/$repo/releases/tag/${latest}"
                fi
              fi
            fi

            if [ -z "$latest" ]; then
              echo "skip $tool ($repo, source=$source): no upstream version available"
              continue
            fi

            prev=$(jq -r --arg t "$tool" '.[$t] // ""' <<<"$new_state")
            if [ "$latest" != "$prev" ]; then
              updates=$(jq --arg t "$tool" --arg r "$repo" --arg p "$prev" --arg n "$latest" --arg u "$url" --arg s "$source" \
                '. + [{tool:$t, repo:$r, previous:$p, latest:$n, url:$u, source:$s}]' <<<"$updates")
            fi
            new_state=$(jq --arg t "$tool" --arg v "$latest" '.[$t] = $v' <<<"$new_state")
          done

          echo "$new_state" > "$state_file"
          echo "$updates" > /tmp/release-updates.json
          count=$(jq 'length' <<<"$updates")
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Detected $count upgrades"
          jq -r '.[] | "  - \(.tool): \(.previous) → \(.latest)"' <<<"$updates"

      - name: Summarize releases and open issue
        if: steps.diff.outputs.count != '0'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Explicit allow-list. Without these, gh / Read / Grep commands
          # hit "This command requires approval" mid-run and the model
          # gives up without opening an issue.
          claude_args: |
            --allowedTools "Bash(gh issue create:*),Bash(gh release view:*),Bash(gh api:*),Bash(cat:*),Read,Glob,Grep,WebFetch"
          prompt: |
            Read `/tmp/release-updates.json` — it lists upstream tools
            that shipped a new version since last week. Each entry has:
            tool, repo, previous, latest, url, source.

            `source` is "release" (the repo publishes GitHub Releases —
            url points at the release page, has changelog notes) or
            "tag" (the repo only tags, no release notes attached — url
            points at a compare diff, e.g. ghostty).

            ## Method

            For each entry:

              1. Fetch the changelog.
                 - `source` = "release": prefer
                   `gh release view <latest> --repo <repo>`; fall back to
                   WebFetch on `url`. If `previous` is non-empty and
                   intermediate tags exist, skim them via
                   `gh api repos/<repo>/releases`.
                 - `source` = "tag": no release notes exist. Use
                   WebFetch on `url` (a compare diff), and/or Read the
                   repo's CHANGELOG via
                   `gh api repos/<repo>/contents/CHANGELOG.md`
                   (filename varies — try CHANGELOG.md, CHANGES.md,
                   docs/CHANGELOG.md). If neither yields useful
                   information, skip the tool in the issue body — a
                   bare tag bump without a changelog is not actionable.
              2. List the config files under `.config/<tool>/` (use
                 Glob) and Read each — filenames vary per tool.
              3. Cross-reference the changelog against the user's
                 config. Flag ONLY:
                   - new options the user would plausibly want to opt
                     into given their existing setup
                   - options the user IS using that are deprecated,
                     renamed, or removed
                   - default value changes that contradict the user's
                     explicit setting (i.e. their override is now
                     redundant or wrong)
                   - breaking syntax changes that affect their file

            Ignore pure internals, performance work, unrelated
            subsystems, and additions in areas the user hasn't
            configured.

            ## Action

            - **No actionable findings across all tools:** print
              `release watch: no actionable changes` and EXIT. Do NOT
              open an issue. Tag bumps alone are not a reason to file.
            - **≥1 actionable finding:** open exactly ONE issue:
              ```
              gh issue create \
                --title "Release watch: $(date -u +%Y-%m-%d)" \
                --label release-watch \
                --body "$BODY"
              ```
              Body structure:
                - One headline line listing every upgraded tool with
                  `previous → latest`, even tools that produced no
                  findings (so the reader sees the full delta).
                - One H2 section per tool that HAS findings. Skip
                  silent tools in the section list.
                - Within each section, bullets in priority order:
                  breaking > deprecation > default change > new
                  opt-in. For each bullet: one-line description, the
                  config file + line in this repo that's relevant
                  (e.g. `.config/starship/starship.toml:42`), the
                  suggested edit when obvious, and the release-notes
                  URL.

            ## Constraints

            - Issue body ≤ 1000 words. If you'd exceed, drop the
              lowest-priority items.
            - Cite real paths and line numbers. Don't invent
              suggestions you haven't verified against the actual
              config file.
            - Don't open a duplicate — the state file commit below
              prevents re-firing on the same tag, but if a prior
              `release-watch` issue is still open for the same week,
              skip filing.

      - name: Commit updated state
        # Always commit when there were upgrades, even if Claude
        # decided not to open an issue — otherwise next week's run
        # would re-process the same tags and keep paying for analysis
        # that already concluded "no actionable changes."
        #
        # Implicit `success() &&` on the if means this is skipped when
        # the Claude step fails, which is what we want: failure → retry
        # next week with the same state.
        if: steps.diff.outputs.count != '0'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/release-watch-state.json
          if git diff --staged --quiet; then
            echo "no state changes to commit"
            exit 0
          fi
          git commit -m "chore: bump release-watch state"

          # Retry push with rebase in case main moved during the run.
          # Without this, a concurrent user push silently wipes the
          # state update and next week's run re-fires on the same tags.
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "push attempt $attempt rejected, fetching + rebasing"
            git fetch origin main
            git rebase origin/main
          done
          echo "state push failed after 3 attempts" >&2
          exit 1
