name: brewfile

on:
  push:
    paths:
      - 'Backup/Brewfile'
      - '.github/workflows/brewfile.yml'
  pull_request:
    paths:
      - 'Backup/Brewfile'
      - '.github/workflows/brewfile.yml'
  workflow_dispatch:

concurrency:
  group: brewfile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle-install:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Show brew & Brewfile info
        run: |
          brew --version
          echo "---"
          wc -l Backup/Brewfile
          echo "---"
          head -20 Backup/Brewfile

      - name: Cache Homebrew downloads
        uses: actions/cache@v6
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
            ~/Library/Caches/Homebrew/Cask
          key: ${{ runner.os }}-brew-${{ hashFiles('Backup/Brewfile') }}
          restore-keys: |
            ${{ runner.os }}-brew-

      - name: brew update (refresh catalog)
        run: brew update --quiet

      - name: Trust Brewfile taps
        run: |
          set -e
          # The runner pre-taps aws/tap and hashicorp/tap. Under the
          # runner's HOMEBREW_REQUIRE_TAP_TRUST their formulas shadow
          # Brewfile cask names (e.g. `copilot-cli` resolves to the
          # untrusted aws/tap/copilot-cli formula instead of the
          # homebrew/cask app) and abort the whole install. Drop them.
          brew untap aws/tap hashicorp/tap 2>/dev/null || true
          # Trust every third-party tap the Brewfile references so
          # tap-trust enforcement doesn't refuse their entries.
          grep '^tap "' Backup/Brewfile | cut -d'"' -f2 | grep -v '^homebrew/' |
            xargs -n1 brew trust --tap

      - name: brew bundle install
        run: |
          set -e
          # Strip mas entries — the runner isn't signed into App Store
          if grep -q '^mas ' Backup/Brewfile; then
            grep -v '^mas ' Backup/Brewfile > /tmp/Brewfile-ci
            echo "Stripped $(grep -c '^mas ' Backup/Brewfile) mas entries"
          else
            cp Backup/Brewfile /tmp/Brewfile-ci
          fi
          brew bundle install --no-upgrade --file=/tmp/Brewfile-ci
